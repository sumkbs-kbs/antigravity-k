# ============================================================================
# Antigravity-K: vLLM 서버 Docker Compose
# ============================================================================
# 사용법:
#   docker compose -f docker-compose.vllm.yml up -d
#   docker compose -f docker-compose.vllm.yml logs -f
#   docker compose -f docker-compose.vllm.yml down
#
# Apple Silicon에서는 vmlx 네이티브를 권장합니다.
# Docker 버전은 CI/CD 또는 대량 배치 처리 시 사용합니다.
# ============================================================================

services:
  vllm-server:
    image: vllm/vllm-openai:latest
    container_name: agk-vllm
    ports:
      - "8000:8000"
    volumes:
      - "${HOME}/.cache/huggingface:/root/.cache/huggingface"
      - "./models:/models"
    environment:
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
    command: >
      --model /models/deepseek-r1-70b
      --host 0.0.0.0
      --port 8000
      --max-model-len 8192
      --dtype float16
      --trust-remote-code
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 80G
