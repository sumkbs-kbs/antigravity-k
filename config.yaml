defaults:
  reasoning: hf.co/Qwen/Qwen3-30B-A3B-GGUF:Q5_K_M
  coding: qwen2.5-coder:32b
  embedding: bge-m3:latest
  vision: qwen2.5vl:32b
memory:
  total_system_gb: 128
  max_loaded_gb: 100
  system_reserve_gb: 16
  auto_unload: true
  unload_cooldown_sec: 30
server:
  host: 127.0.0.1
  port: 8000
  workers: 1
  log_level: info
paths:
  model_cache: ~/.cache/antigravity-k/models
  logs: ./logs
  wiki_dir: /Users/mr.k/wiki/AI_Learnings
workflow:
  autopilot: true
  auto_commit: true
  auto_artifacts: true

collective_intelligence:
  enabled: true
  default_target: collective-council
  min_participants: 2
  max_proposers: 3
  max_critics: 2
  critic_combo: critic-swarm
  arbiter_combo: supreme-court
  expose_trace: true
  philosophy: "여러 중급 이상 모델이 독립 제안, 상호 비판, 최종 합성을 수행해 단일 거대 모델 의존을 줄인다."

autonomous_capabilities:
  enabled: true
  max_autonomous_risk: high          # safe | low | medium | high | critical
  allow_critical_autonomy: false     # desktop/computer control 등 critical 기능은 승인 요청
  auto_match_skills: true
  auto_load_mcp: true
  deny_unauthenticated_remote_mcp: true

agent_models:
  CEO: orchestrator-swarm
  ENG_MANAGER: manager-swarm
  ARCHITECT: architect-swarm
  WORKER: coding-swarm
  QA: qa-swarm
  CRITIC: critic-swarm
  DESIGNER: creative-swarm
  PROPOSER: ideation-swarm
  ARBITER: supreme-court
  default: collective-council
combos:
  collective-council:
    models:
    - qwen3.6:latest
    - hf.co/unsloth/gemma-4-31B-it-GGUF:Q5_K_M
    - hf.co/bartowski/mistralai_Mistral-Small-3.2-24B-Instruct-2506-GGUF:Q5_K_M
    strategy: collective
    description: 차세대 집단지성 평의회 (Qwen3.6-27B Dense 코딩최강 + Gemma4-31B-unsloth 에이전틱최강 + Mistral 한국어균형)
  orchestrator-swarm:
    models:
    - qwen3.6:latest
    - hf.co/unsloth/gemma-4-31B-it-GGUF:Q5_K_M
    - hf.co/bartowski/mistralai_Mistral-Small-3.2-24B-Instruct-2506-GGUF:Q5_K_M
    strategy: collective
    description: CEO/관리자 역할 집단 (Qwen3.6 추론 + Gemma4-unsloth 에이전틱 + Mistral 균형 의사결정)
  manager-swarm:
    models:
    - hf.co/bartowski/mistralai_Mistral-Small-3.2-24B-Instruct-2506-GGUF:Q5_K_M
    - qwen3.6:latest
    - hf.co/unsloth/gemma-4-31B-it-GGUF:Q5_K_M
    strategy: collective
    description: 실무 매니징 집단 (Mistral 균형 판단 + Qwen3.6 추론 + Gemma4 에이전틱)
  architect-swarm:
    models:
    - qwen3.6:latest
    - hf.co/bartowski/mistralai_Mistral-Small-3.2-24B-Instruct-2506-GGUF:Q5_K_M
    - deepseek-r1:32b
    - hf.co/unsloth/gemma-4-31B-it-GGUF:Q5_K_M
    strategy: collective
    description: 구조 설계 특화 집단 (Qwen3.6 기획 + Mistral 균형 + DeepSeek 논리 + Gemma4 비평)
  coding-swarm:
    models:
    - qwen3.6:latest
    - hf.co/unsloth/gemma-4-31B-it-GGUF:Q5_K_M
    - hf.co/bartowski/mistralai_Mistral-Small-3.2-24B-Instruct-2506-GGUF:Q5_K_M
    strategy: collective
    description: 코딩 워커 집단 (Qwen3.6-27B SWE-bench 77.2 코딩최강 + Gemma4 에이전틱 + Mistral 한국어검증)
  qa-swarm:
    models:
    - hf.co/bartowski/mistralai_Mistral-Small-3.2-24B-Instruct-2506-GGUF:Q5_K_M
    - hf.co/unsloth/gemma-4-31B-it-GGUF:Q5_K_M
    - qwen3.6:latest
    strategy: collective
    description: QA 테스트 집단 (Mistral QA + Gemma4 비전/에이전틱 + Qwen3.6 추론)
  critic-swarm:
    models:
    - hf.co/bartowski/mistralai_Mistral-Small-3.2-24B-Instruct-2506-GGUF:Q5_K_M
    - deepseek-r1:32b
    - hf.co/unsloth/gemma-4-31B-it-GGUF:Q5_K_M
    strategy: fallback
    description: 코드 및 논리 비판 전담 (Mistral/DeepSeek 우선, Gemma4 폴백)
  creative-swarm:
    models:
    - hf.co/bartowski/mistralai_Mistral-Small-3.2-24B-Instruct-2506-GGUF:Q5_K_M
    - hf.co/unsloth/gemma-4-31B-it-GGUF:Q5_K_M
    - qwen3.6:latest
    strategy: collective
    description: 디자인/기획 집단 (Mistral 창작 + Gemma4-unsloth 비전 + Qwen3.6 구조)
  ideation-swarm:
    models:
    - qwen3.6:latest
    - hf.co/unsloth/gemma-4-31B-it-GGUF:Q5_K_M
    - hf.co/bartowski/mistralai_Mistral-Small-3.2-24B-Instruct-2506-GGUF:Q5_K_M
    strategy: collective
    description: 아이디어 제안 집단 (Qwen3.6-35B MoE 초고속 + Gemma4-unsloth + Mistral)
  supreme-court:
    models:
    - mistral-medium-3.5:128b
    - deepseek-r1:70b
    - deepseek-r1:32b
    strategy: fallback
    description: 최종 판결 집단 (Mistral-Medium-128B 최고품질 + DeepSeek-70B 논리 + DeepSeek-32B 경량폴백)
  fast-response:
    models:
    - qwen3.6:latest
    - hf.co/bartowski/mistralai_Mistral-Small-3.2-24B-Instruct-2506-GGUF:Q5_K_M
    - hf.co/unsloth/gemma-4-31B-it-GGUF:Q5_K_M
    strategy: load-balance
    description: 일반 응답용 로드밸런싱 (Qwen3.6-35B MoE 초고속3B활성 + Mistral 한국어 + Gemma4 비전)
  reasoning-balanced:
    models:
    - qwen3.6:latest
    - hf.co/bartowski/mistralai_Mistral-Small-3.2-24B-Instruct-2506-GGUF:Q5_K_M
    - hf.co/unsloth/gemma-4-31B-it-GGUF:Q5_K_M
    strategy: collective
    description: 균형 잡힌 추론 집단 (Qwen3.6-27B Dense + Mistral + Gemma4 교차 검증)
router:
  default_strategy: fallback
  cooldown_base_sec: 60
  max_cooldown_sec: 3600
  max_retries: 3
  usage_tracking: true
  usage_db_path: ./data/usage.json
api_keys:
  anthropic: sk-ant-your-key-here
  openai: sk-proj-your-key-here

# ─── NemoClaw-ported Security Settings ───
secret_scanner:
  enabled: true
  block_on_memory_write: true    # 메모리에 시크릿 감지 시 차단
  redact_agent_output: true      # 에이전트 출력에서 시크릿 자동 마스킹
  redact_mode: partial           # partial | full
  custom_patterns: []            # 추가 regex 패턴 (선택)

shields:
  default_timeout_seconds: 300   # 기본 5분
  max_timeout_seconds: 3600      # 최대 1시간
  default_mode: safe             # 기본 toolset (shields UP 시)
  auto_restore_on_crash: true    # 비정상 종료 시 자동 UP 복원

guardrails:
  warnings_enabled: true
  hard_stop_enabled: false
  max_consecutive_failures: 5    # 연속 실패 시 경고
  max_tool_loop_count: 10        # 비진행성 루프 탐지 임계값
  stall_detection: true          # 비진행성 루프 자동 탐지

ambient_partner:
  watchdog_enabled: true         # Phase 3: Proactive Watchdog 백그라운드 활성화

# ─── External Brain (외부 AI 두뇌 간접 연동) ───
external_brains:
  enabled: true
  strategy: fallback              # fallback | round-robin | compare
  adapters:
    gemini_app:
      enabled: true
      type: applescript            # macOS 네이티브 앱 제어
      app_name: Gemini
      timeout_sec: 120
    chatgpt_web:
      enabled: true
      type: playwright             # 웹 브라우저 제어
      url: https://chatgpt.com
      timeout_sec: 120
    gemini_web:
      enabled: true
      type: playwright
      url: https://gemini.google.com
      timeout_sec: 120

media_generation:
  text_to_image:
    enabled: true
    model: "schnell" # FLUX.1-schnell via mflux
    quantize: "q4"
  text_to_audio:
    enabled: true
    model: "kokoro-v0_19.onnx"
  text_to_video:
    enabled: true
    model: "Lightricks/LTX-Video"
    backend: "mps"
