  reasoning: qwen3.6:latest
  coding: qwen3-coder-next:latest
  embedding: nomic-embed-text:latest
  vision: llama3.2-vision:11b
providers:
  ollama:
    base_url: http://localhost:11434
    api_key_env: OLLAMA_API_KEY
    description: 로컬 Ollama (무제한, 프라이버시 보장)
  openrouter:
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    description: OpenRouter (다중 모델聚合, 유료/무료 혼합)
  nim:
    base_url: https://integrate.api.nvidia.com/v1
    api_key_env: NVIDIA_API_KEY
    rate_limit: 40
    description: NVIDIA NIM (build.nvidia.com 무료, 80+ 모델, 40rpm/1000req-day)
  anthropic:
    base_url: https://api.anthropic.com
    api_key_env: ANTHROPIC_API_KEY
    description: Anthropic 직접 SDK (Claude 전용)
  openai:
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    description: OpenAI 직접 (GPT-4o, GPT-4o-mini, o1 등)
  gemini:
    base_url: https://generativelanguage.googleapis.com/v1beta/openai
    api_key_env: GEMINI_API_KEY
    description: Google Gemini 직접 (OpenAI 호환 엔드포인트)
  zai:
    base_url: https://open.bigmodel.cn/api/paas/v4
    api_key_env: ZAI_API_KEY
    description: ZAI/Zhipu 직접 (GLM-4, GLM-5 시리즈)
agent_models:
  default: orchestrator-swarm
  CEO: orchestrator-swarm
  WORKER: coding-swarm
  QA: reasoning-swarm
  ENG_MANAGER: reasoning-swarm
  DESIGNER: reasoning-swarm
combos:
  orchestrator-swarm:
    description: CEO 분석/단순 대화 — 빠른 응답 우선, 3단계 폴백 (Ollama→OpenRouter→NIM)
    strategy: fallback
    models:
    - qwen3.6:latest
    - qwen/qwen3-next-80b-a3b-instruct:free
    - google/gemma-4-26b-a4b-it:free
    - meta/llama-3.3-70b-instruct
    - openai/gpt-4o-mini
  reasoning-swarm:
    description: 추론/QA/분석 — 대형 모델 우선, 3단계 폴백 (Ollama→OpenRouter→NIM)
    strategy: fallback
    models:
    - nvidia/nemotron-3-ultra-550b-a55b:free
    - qwen/qwen3-next-80b-a3b-instruct:free
    - qwen3.6:latest
    - meta/llama-3.1-405b-instruct
    - deepseek-ai/deepseek-r1
    - qwen/qwen3-235b-a35b
    - google/gemini-2.0-flash-001
  coding-swarm:
    description: 코딩 — 로컬 코더 우선, 3단계 폴백 (Ollama→OpenRouter→NIM)
    strategy: fallback
    models:
    - qwen3-coder-next:latest
    - qwen/qwen2.5-coder-32b-instruct
    - qwen/qwen3-next-80b-a3b-instruct
    - anthropic/claude-3.5-sonnet
    - meta/llama-3.3-70b-instruct
    - openai/gpt-4o
    - cohere/north-mini-code:free
  vision-swarm:
    description: 비전/이미지 — 로컬 우선, 3단계 폴백 (Ollama→OpenRouter→NIM)
    strategy: fallback
    models:
    - llama3.2-vision:11b
    - meta/llama-3.2-90b-vision-instruct
    - openai/gpt-4o
    - microsoft/phi-3.5-vision-instruct
server:
  host: 127.0.0.1
  port: 8000
security:
  access_pin: '0000'
  sandbox_enabled: true
  sandbox_network: none
  max_execution_time: 30
  audit_log_enabled: true
paths:
  models_dir: models
  data_dir: data
  logs_dir: logs
workflow:
  autopilot: false
  auto_commit: false
  auto_artifacts: false
i18n:
  locale: auto
  fallback_locale: en
router:
  default_strategy: fallback
  max_retries: 3
  usage_tracking: true
tool_loop:
  native_function_calling: false
self_evolution:
  auto_modify: false
cost:
  enabled: true
  daily_budget_usd: 50.0
  hourly_action_limit: 100
computer_use:
  enabled: true
  hitl_required: true
