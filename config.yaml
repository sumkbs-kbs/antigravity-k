integrations:
  slack:
    enabled: false
    bot_token: xoxb-your-slack-bot-token
    app_token: xapp-your-slack-app-token
  discord:
    enabled: false
    token: your-discord-bot-token
models:
  reasoning:
  - name: deepseek-r1:32b
    repo: deepseek-r1:32b
    role: reasoning
    quantization: 4bit
    estimated_memory_gb: 20
    context_length: 32768
    description: DeepSeek R1 32B — 미들급 아키텍트 모델
  - name: qwen3.6:latest
    repo: qwen3.6:latest
    role: reasoning
    quantization: 4bit
    estimated_memory_gb: 23
    context_length: 32768
    description: Qwen 3.6 — 고성능 미들급 (CEO, 라우팅용)
  - name: deepseek-r1:70b
    repo: deepseek-r1:70b
    role: reasoning
    quantization: 4bit
    estimated_memory_gb: 38
    context_length: 65536
    description: DeepSeek R1 — 고급 추론
  - name: llama4:latest
    repo: mlx-community/Llama-4-Scout-17B-4bit
    role: reasoning
    quantization: 4bit
    estimated_memory_gb: 10
    context_length: 131072
    description: Llama 4 Scout — 경량, 빠른 테스트용
  - name: claude-3-5-sonnet-20241022
    repo: anthropic
    role: reasoning
    quantization: api
    estimated_memory_gb: 0.0
    context_length: 200000
    description: Claude 3.5 Sonnet API (Cloud)
  - name: hf.co/Jiunsong/SuperGemma4-31b-abliterated-GGUF:latest
    repo: hf.co/Jiunsong/SuperGemma4-31b-abliterated-GGUF
    role: reasoning
    quantization: gguf
    estimated_memory_gb: 20
    context_length: 32768
    description: SuperGemma4 31B Abliterated (HuggingFace GGUF)
  coding:
  - name: qwen2.5-coder:32b
    repo: qwen2.5-coder:32b
    role: coding
    quantization: 4bit
    estimated_memory_gb: 18
    context_length: 32768
    description: Qwen 코더 32B — 메인 워커용 미들급 코더

  embedding:
  - name: bge-m3:latest
    repo: bge-m3:latest
    role: embedding
    estimated_memory_gb: 1.0
    dimensions: 1024
    description: BGE-M3 — 다국어 임베딩, 한국어 지원
  - name: nomic-embed-text:latest
    repo: nomic-embed-text:latest
    role: embedding
    estimated_memory_gb: 0.5
    dimensions: 768
    description: Nomic Embed — 경량 임베딩
  vision:
  - name: qwen2.5vl:32b
    repo: qwen2.5vl:32b
    role: vision
    quantization: 4bit
    estimated_memory_gb: 19
    context_length: 32768
    description: Qwen2.5-VL 32B — 최강 시각 추론 (UI/차트/레이아웃 분석)
  - name: llava:13b
    repo: llava:13b
    role: vision
    quantization: 4bit
    estimated_memory_gb: 8
    description: LLaVA 13B — 경량 멀티모달 비전 (폴백)
defaults:
  reasoning: hf.co/Jiunsong/SuperGemma4-31b-abliterated-GGUF:latest
  coding: qwen2.5-coder:32b
  embedding: bge-m3:latest
  vision: qwen2.5vl:32b
memory:
  total_system_gb: 128
  max_loaded_gb: 100
  system_reserve_gb: 16
  auto_unload: true
  unload_cooldown_sec: 30
server:
  host: 127.0.0.1
  port: 8000
  workers: 1
  log_level: info
paths:
  model_cache: ~/.cache/antigravity-k/models
  logs: ./logs
  wiki_dir: /Users/mr.k/wiki/AI_Learnings
workflow:
  autopilot: true
  auto_commit: true
  auto_artifacts: true
agent_models:
  CEO: orchestrator-swarm
  ENG_MANAGER: manager-swarm
  ARCHITECT: architect-swarm
  WORKER: coding-swarm
  QA: qa-swarm
  CRITIC: critic-swarm
  DESIGNER: creative-swarm
  PROPOSER: ideation-swarm
  ARBITER: supreme-court
  default: fast-response
combos:
  orchestrator-swarm:
    models:
    - hf.co/Jiunsong/SuperGemma4-31b-abliterated-GGUF:latest
    - qwen3.6:latest
    strategy: round-robin
    description: CEO/관리자 역할 집단 (Google + Alibaba 순환 의사결정)
  manager-swarm:
    models:
    - qwen3.6:latest
    - llama4:latest
    strategy: round-robin
    description: 실무 매니징 집단
  architect-swarm:
    models:
    - deepseek-r1:32b
    - nemotron-3-super:latest
    - hf.co/Jiunsong/SuperGemma4-31b-abliterated-GGUF:latest
    strategy: round-robin
    description: 구조 설계 특화 집단 (DeepSeek 논리 + Nvidia 비평 + Google 균형)
  coding-swarm:
    models:
    - qwen2.5-coder:32b
    - llama4:latest
    - deepseek-r1:32b
    strategy: round-robin
    description: 코딩 워커 집단 (각기 다른 모델이 번갈아가며 코드 작성 및 리뷰)
  qa-swarm:
    models:
    - llama4:latest
    - hf.co/Jiunsong/SuperGemma4-31b-abliterated-GGUF:latest
    strategy: round-robin
    description: 엣지 케이스 테스트 집단
  critic-swarm:
    models:
    - nemotron-3-super:latest
    - deepseek-r1:32b
    strategy: round-robin
    description: 코드 및 논리 비판 전담 집단
  creative-swarm:
    models:
    - hf.co/Jiunsong/SuperGemma4-31b-abliterated-GGUF:latest
    - qwen3.6:latest
    strategy: round-robin
    description: 디자인/기획 집단
  ideation-swarm:
    models:
    - qwen3.6:latest
    - hf.co/Jiunsong/SuperGemma4-31b-abliterated-GGUF:latest
    strategy: round-robin
    description: 아이디어 제안 집단
  supreme-court:
    models:
    - deepseek-r1:70b
    - nemotron-3-super:latest
    strategy: fallback
    description: 최종 판결 집단 (초거대 모델 폴백 체인)
  fast-response:
    models:
    - hf.co/Jiunsong/SuperGemma4-31b-abliterated-GGUF:latest
    - qwen3.6:latest
    strategy: load-balance
    description: 일반 응답용 로드밸런싱 집단
  reasoning-balanced:
    models:
    - deepseek-r1:32b
    - hf.co/Jiunsong/SuperGemma4-31b-abliterated-GGUF:latest
    - qwen3.6:latest
    strategy: round-robin
    description: 균형 잡힌 추론 집단 (Reflection, Watchdog, Trainer 용)
router:
  default_strategy: fallback
  cooldown_base_sec: 60
  max_cooldown_sec: 3600
  max_retries: 3
  usage_tracking: true
  usage_db_path: ./data/usage.json
api_keys:
  anthropic: sk-ant-your-key-here
  openai: sk-proj-your-key-here

# ─── NemoClaw-ported Security Settings ───
secret_scanner:
  enabled: true
  block_on_memory_write: true    # 메모리에 시크릿 감지 시 차단
  redact_agent_output: true      # 에이전트 출력에서 시크릿 자동 마스킹
  redact_mode: partial           # partial | full
  custom_patterns: []            # 추가 regex 패턴 (선택)

shields:
  default_timeout_seconds: 300   # 기본 5분
  max_timeout_seconds: 3600      # 최대 1시간
  default_mode: safe             # 기본 toolset (shields UP 시)
  auto_restore_on_crash: true    # 비정상 종료 시 자동 UP 복원

guardrails:
  warnings_enabled: true
  hard_stop_enabled: false
  max_consecutive_failures: 5    # 연속 실패 시 경고
  max_tool_loop_count: 10        # 비진행성 루프 탐지 임계값
  stall_detection: true          # 비진행성 루프 자동 탐지

ambient_partner:
  watchdog_enabled: true         # Phase 3: Proactive Watchdog 백그라운드 활성화

# ─── External Brain (외부 AI 두뇌 간접 연동) ───
external_brains:
  enabled: true
  strategy: fallback              # fallback | round-robin | compare
  adapters:
    gemini_app:
      enabled: true
      type: applescript            # macOS 네이티브 앱 제어
      app_name: Gemini
      timeout_sec: 120
    chatgpt_web:
      enabled: true
      type: playwright             # 웹 브라우저 제어
      url: https://chatgpt.com
      timeout_sec: 120
    gemini_web:
      enabled: true
      type: playwright
      url: https://gemini.google.com
      timeout_sec: 120
