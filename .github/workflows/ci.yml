# Antigravity-K CI — Code Quality Pipeline
#
# Runs on every push and pull request (and nightly at midnight):
#   1. Linting (ruff check)
#   2. Formatting (ruff format)
#   3. Type checking (mypy)
#   4. Fast tests (non-slow, non-benchmark)
#   5. Package build verification (wheel/sdist)
#   6. Security scan (secrets + hardcoded credentials)
#   7. Dashboard lint & build
#   8. Coverage report + PR comment
#
# Phase 1 D3: 추가된 build job, coverage PR comment, scheduled trigger, improved caching.
# Phase 1 D5: Plan/Build/Interactive 모드 검증 시나리오 포함 (test-plan-mode).

name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
  schedule:
    # Nightly build at 00:00 UTC — catch regressions early
    - cron: "0 0 * * *"
  workflow_call:
    # Reusable workflow for other CI pipelines (benchmark, deploy, etc.)
    # Example: jobs: { ci: { uses: ./.github/workflows/ci.yml } }

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PYTHON_VERSION: "3.12"
  # Shared pip cache key — 변경 시 모든 job에서 캐시 무효화
  CACHE_VERSION: "v1"

jobs:
  lint:
    name: "Lint & Format"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            setup.py

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff Lint Check
        run: ruff check src/ tests/ scripts/

      - name: Ruff Format Check
        run: ruff format --check src/ tests/ scripts/

  typecheck:
    name: "Type Check"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true  # mypy warnings are advisory for now

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            setup.py

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install mypy pydantic types-PyYAML

      - name: Mypy Check
        run: |
          mypy src/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --no-warn-return-any \
            --warn-unused-configs \
            || true

  test:
    name: "Tests (${{ matrix.os }})"
    strategy:
      fail-fast: false
      matrix:
        # Run on both Linux and macOS so the Apple-Silicon / MLX code path is
        # exercised in CI (the product's primary platform).
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,rag]"

      - name: Run Tests (exclude slow/benchmark)
        run: |
          python -m pytest tests/ \
            -v --tb=short \
            -m 'not slow and not benchmark' \
            --junit-xml=test-results.xml \
            --cov=src/antigravity_k \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload Test Results
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: test-results.xml
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Coverage Report (XML)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-${{ matrix.os }}
          path: coverage.xml
          retention-days: 30
          if-no-files-found: warn

  build:
    name: "Build Package"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            setup.py

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip build

      - name: Build wheel + sdist
        run: |
          python -m build

      - name: Verify wheel installs cleanly
        run: |
          pip install dist/*.whl
          python -c "from antigravity_k import __version__; print(f'Package version: {__version__}')" 2>/dev/null || \
          python -c "import antigravity_k; print('Package imported successfully')"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
          if-no-files-found: warn

  dashboard:
    name: "Dashboard Lint & Build"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install Dependencies
        run: cd dashboard && npm install

      - name: Lint Dashboard
        run: cd dashboard && npm run lint

      - name: Build Dashboard
        run: cd dashboard && npm run build

  mutation-test:
    name: "Mutation Test (Stryker)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Run only on push/PR to main (not on schedule) — Stryker is resource-intensive
    if: github.event_name != 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install Dependencies
        run: cd dashboard && npm install

      - name: Run Stryker Mutation Testing
        run: |
          cd dashboard && npx stryker run \
            --mutate 'src/stores/terminalStore.ts' \
            --mutate 'src/stores/outputStore.ts' \
            --mutate 'src/stores/localHistoryStore.ts' \
            --mutate 'src/stores/agentMonitorStore.ts' \
            --mutate 'src/plugin/pluginRegistry.ts'
        env:
          # Headless mode — no TTY interaction needed
          CI: true

      - name: Upload Stryker Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-report
          path: dashboard/reports/
          retention-days: 30
          if-no-files-found: ignore

  security-scan:
    name: "Security Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Secret scanning (gitleaks) ──────────────────────────
      - name: Secret Scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: true

      # ── 2. Python dependency audit (pip-audit) ─────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Dependency Audit (pip-audit)
        run: |
          python -m pip install --upgrade pip pip-audit
          # Audit the resolved environment against the PyPI advisory database.
          # Uses pyproject.toml + uv.lock/requirements.txt as the source.
          pip-audit --strict --desc

      # ── 3. SAST (bandit) ───────────────────────────────────────
      - name: SAST Scan (bandit)
        run: |
          python -m pip install bandit
          # Scan src/ for common security issues; fail on MEDIUM+ severity.
          bandit -r src/antigravity_k -ll -ii -ii -x src/antigravity_k/engine/secret_scanner.py \
            -f sarif -o bandit-results.sarif || true
          # Re-run to get a pass/fail exit code for the gate (level MEDIUM+).
          bandit -r src/antigravity_k -ll -x src/antigravity_k/engine/secret_scanner.py

      - name: Upload Bandit SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-results
          path: bandit-results.sarif

      # ── 4. Internal secret scanner (legacy, kept for coverage) ─
      - name: Secret Scan (internal scanner)
        run: |
          python -m pip install -e ".[dev]"
          python -c "
          import sys
          sys.path.insert(0, 'src')
          from antigravity_k.engine.secret_scanner import scan_for_secrets, is_sensitive_file
          import os

          issues = []
          for root, dirs, files in os.walk('.'):
              if any(s in root for s in ['.git', '__pycache__', 'node_modules', '.venv', 'dist', 'build', '.antigravity']):
                  continue
              for fname in files:
                  if fname.startswith('.'):
                      continue
                  if is_sensitive_file(fname):
                      continue
                  fpath = os.path.join(root, fname)
                  try:
                      with open(fpath, 'r', encoding='utf-8', errors='ignore') as fh:
                          content = fh.read()
                      matches = scan_for_secrets(content)
                      if matches:
                          issues.append(f'  {fpath}: {[m.pattern for m in matches]}')
                  except Exception:
                      pass

          if issues:
              print('Potential secrets detected:')
              for i in issues:
                  print(i)
              print(f'\nTotal: {len(issues)} file(s) with potential secrets')
              sys.exit(1)
          else:
              print('No secrets detected in scanned files.')
          "

  e2e-test:
    name: "E2E Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run only on push/PR to main (not on schedule) — requires backend server
    if: github.event_name != 'schedule'
    env:
      AGK_BACKEND_URL: http://127.0.0.1:8000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Set up Node.js 20
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install Dashboard Dependencies
        run: cd dashboard && npm install

      - name: Install Playwright Browsers
        run: cd dashboard && npx playwright install chromium

      - name: Build Dashboard (static)
        run: cd dashboard && npm run build

      - name: Start Backend Server
        run: |
          PYTHONPATH=src python -m uvicorn antigravity_k.api.server:app \
            --host 127.0.0.1 --port 8000 &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"
          echo "SERVER_PID=$SERVER_PID" >> "$GITHUB_ENV"
          # Wait for server to be ready
          for i in $(seq 1 10); do
            status=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8000/health 2>/dev/null)
            if [ "$status" = "200" ]; then
              echo "Backend server ready (HTTP $status)"
              break
            fi
            echo "Waiting for backend... attempt $i"
            sleep 2
          done

      - name: Run Python E2E Smoke Tests
        run: |
          python -m pytest tests/test_e2e_smoke.py -v --tb=short 2>&1 | tee e2e-smoke-results.txt

      - name: Run Accessibility E2E Tests (Playwright)
        # Accessibility is the hard gate — all 12 tests must pass.
        env:
          PLAYWRIGHT_OUTPUT_DIR: a11y-test-results
        run: |
          cd dashboard && npx playwright test \
            e2e/tests/accessibility.spec.ts \
            --project=chromium --reporter=list 2>&1 | tee ../e2e-a11y-results.txt

      - name: Run Full Playwright E2E Suite
        # Full suite is informational (continue-on-error) — accessibility is the hard gate.
        continue-on-error: true
        env:
          PLAYWRIGHT_OUTPUT_DIR: test-results-full
        run: |
          cd dashboard && npx playwright test --project=chromium --reporter=list 2>&1 | tee ../e2e-full-results.txt

      - name: Upload E2E Smoke Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-results
          path: e2e-smoke-results.txt
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Accessibility E2E Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-a11y-results
          path: e2e-a11y-results.txt
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Accessibility E2E Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-a11y-artifacts
          path: dashboard/a11y-test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Full E2E Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: dashboard/e2e-report/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Full E2E Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-full-artifacts
          path: dashboard/test-results-full/
          retention-days: 7
          if-no-files-found: ignore

      - name: Stop Backend Server
        if: always()
        run: |
          pkill -f "uvicorn antigravity_k.api.server:app" || true

  dependency-sbom:
    name: "SBOM Generation"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Generate SBOM (CycloneDX)
        run: |
          python -m pip install --upgrade pip cyclonedx-bom
          # Generate a CycloneDX SBOM from the dependency manifest.
          cyclonedx-py environment -o sbom.cdx.json --schema-version 1.5

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 90

  coverage-report:
    name: "Coverage Report"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test]
    if: github.event_name == 'pull_request' && !cancelled()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Coverage XML
        uses: actions/download-artifact@v4
        with:
          # After adding the OS matrix, the artifact name includes the OS.
          name: coverage-xml-ubuntu-latest
          path: ./
          run-id: ${{ github.event.workflow_run.id || github.run_id }}

      - name: Generate Coverage Summary
        id: coverage-summary
        run: |
          if [ ! -f coverage.xml ]; then
            echo "No coverage.xml found — skipping"
            echo "has-report=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract coverage percentage from Cobertura XML
          COVER_PCT=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          line_rate = float(root.attrib.get('line-rate', 0))
          print(f'{line_rate * 100:.1f}')
          ")

          echo "coverage-pct=$COVER_PCT" >> "$GITHUB_OUTPUT"
          echo "has-report=true" >> "$GITHUB_OUTPUT"
          echo "Coverage: $COVER_PCT%"

          # Generate markdown summary
          cat > coverage-summary.md << EOF
          ## 📊 Coverage Report

          **Total coverage:** ${COVER_PCT}%

          | Metric | Value |
          |:---|---:|
          | Line Coverage | ${COVER_PCT}% |
          | Threshold | 55% |

          > The actual coverage as of 2026-07 is 46.5%. Run `pytest --cov=src/antigravity_k` locally to check current status.

          > See [coverage_html](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/coverage/) for full report.
          EOF

          echo "Summary generated"

      - name: Upload Coverage Summary
        if: steps.coverage-summary.outputs.has-report == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage-summary.md
          retention-days: 7
          if-no-files-found: warn

      - name: Post PR Comment
        if: steps.coverage-summary.outputs.has-report == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'coverage-summary.md';

            if (!fs.existsSync(reportPath)) {
              console.log('No coverage summary found — skipping PR comment');
              return;
            }

            const body = fs.readFileSync(reportPath, 'utf-8');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.body && c.body.includes('Coverage Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log('Updated existing coverage comment');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              console.log('Created new coverage comment');
            }
