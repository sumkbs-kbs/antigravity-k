# Release workflow — builds and publishes the package to PyPI on git tags.
# Uses GitHub Trusted Publishing (OIDC) so no long-lived PyPI tokens are stored
# as a repository secret.
#
# Trigger: push a tag matching `v*` (e.g. v0.2.0).
name: "Release"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only, do not publish)"
        required: false
        default: "true"

permissions:
  contents: read
  id-token: write  # Required for PyPI Trusted Publishing (OIDC).

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: "Build distributions"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for version inference from tags.

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip build

      - name: Build wheel + sdist
        run: python -m build

      - name: Verify the wheel installs
        run: |
          pip install dist/*.whl
          python -c "import antigravity_k; print('import ok')"

      - name: Extract version
        id: meta
        run: |
          VERSION=$(python -c "from pathlib import Path; print(__import__('tomllib').loads(Path('pyproject.toml').read_text('utf-8'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30

  publish-pypi:
    name: "Publish to PyPI"
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    # Skip publishing on manual dry-run or on non-tag pushes.
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'

    environment:
      name: pypi
      url: https://pypi.org/project/antigravity-k/

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (Trusted Publishing / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Trusted Publishing requires no password — OIDC handles auth.
          # Configure the trusted publisher at https://pypi.org/manage/account/publishing/
          print-hash: true

  github-release:
    name: "Create GitHub Release"
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 5
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
          draft: false
          prerelease: ${{ contains(needs.build.outputs.version, '-') }}
